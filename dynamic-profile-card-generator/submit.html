<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
      }
      input {
        display: block;
        /* border-radius: 10px; */
        /* background-color: #222; */
      }
      #main {
        padding: 30px;
        width: 100%;
        height: 100%;
        background-color: #222;
      }
      #btn {
        padding: 12px 22px;
        background-color: red;
        color: white;
        border-radius: 5px;
        font-weight: 600;
        user-select: none;
      }

      #btn:hover {
        background-color: rgb(170, 5, 5);
        transition: all;
      }
      .card {
        max-width: 300px;
        color: white;
        margin-top: 40px;
        padding: 20px;
        border-radius: 10px;
        border: 2px solid #555;
        display: inline-block;
      }
      .profilePic {
        width: 50px;
        height: 50px;
        /* background-color: red; */
        border-radius: 50%;
        margin-bottom: 7px;
        overflow: hidden;
      }
      .profile img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .card h5 {
        margin-top: 3px;
      }
      .card p {
        font-size: 12px;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div id="main">
      <form action="">
        <input type="text" placeholder="profilePic" />
        <input type="text" placeholder="name" />
        <input type="text" placeholder="occupation" />
        <input type="text" placeholder="Info" />
        <input type="submit" />
      </form>
